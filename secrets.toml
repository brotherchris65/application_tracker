# .streamlit/secrets.toml
# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT:
#   Save this file to .streamlit/secrets.toml in your project folder.
#   Never commit this file to GitHub — it is already in .gitignore.
#
# STREAMLIT COMMUNITY CLOUD:
#   In your app dashboard → Settings → Secrets
#   Paste the contents of this file (without this comment block).
# ─────────────────────────────────────────────────────────────────────────────

[anthropic]
api_key = "sk-ant-api03-REPLACE_WITH_YOUR_KEY"

[snowflake]
account   = "YOUR_ACCOUNT_IDENTIFIER"   # e.g. "abc12345.us-east-1"
user      = "YOUR_SNOWFLAKE_USERNAME"
password  = "YOUR_SNOWFLAKE_PASSWORD"
warehouse = "YOUR_WAREHOUSE_NAME"       # e.g. "COMPUTE_WH"
database  = "JOB_TRACKER"              # created automatically on first run
schema    = "PUBLIC"
role      = "SYSADMIN"                 # or whichever role has CREATE DATABASE
